{% extends "base.html" %}
{% block title %}Payment Failed{% endblock %}
{% block content %}
<div class="container py-5" data-aos="zoom-in">
  <div class="text-center">
    <div class="mb-4">
      <svg width="96" height="96" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#ef4444" opacity="0.15"/>
        <path d="M15 9l-6 6M9 9l6 6" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="fw-bold mb-2">Payment Failed</h2>
    <p class="text-muted mb-4">We could not verify your payment.</p>
    <div class="glass-panel p-4 mx-auto" style="max-width: 560px;">
      <div class="row g-3">
        <div class="col-12"><div class="text-muted small">Order ID</div><div class="fw-semibold">{{ order_id or '—' }}</div></div>
      </div>
    </div>
    <div class="mt-4 d-flex justify-content-center gap-2">
      <a href="{{ url_for('fees_bp.my_fees') }}" class="btn btn-primary rounded-pill px-4">
        Try Again
      </a>
    </div>
  </div>
  <div class="position-fixed top-0 start-0 w-100 h-100" style="pointer-events:none; z-index:-1;">
    <div class="floating" style="position:absolute; left:15%; top:25%; width:8px; height:8px; background: #ef4444; border-radius:50%; animation: float 6s ease-in-out infinite;"></div>
    <div class="floating" style="position:absolute; left:75%; top:45%; width:6px; height:6px; background: #4f46e5; border-radius:50%; animation: float 7s ease-in-out infinite;"></div>
  </div>
</div>
<style>
@keyframes float { 0%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } 100%{ transform: translateY(0)} }
</style>
{% endblock %}
