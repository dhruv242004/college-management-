{% extends "base.html" %}
{% block title %}Login – College CMS{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card-3d">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-circle mb-3 shadow" style="width: 80px; height: 80px;">
        <i class="bi bi-mortarboard-fill text-primary fs-1"></i>
      </div>
      <h2 class="text-white fw-bold mb-1">Welcome Back</h2>
      <p class="text-white-50">Sign in to your account</p>
    </div>

    <form method="post">
      <div class="mb-4">
        <label class="form-label text-white-50 small text-uppercase fw-bold">Username</label>
        <div class="input-group">
          <span class="input-group-text border-0 bg-white text-primary rounded-start-3 ps-3"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control border-0 rounded-end-3" placeholder="Enter username" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-white-50 small text-uppercase fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text border-0 bg-white text-primary rounded-start-3 ps-3"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control border-0 rounded-end-3" placeholder="••••••••" required>
        </div>
      </div>

      <div class="d-grid gap-2 mt-5">
        <button type="submit" class="btn btn-primary btn-lg shadow-lg fw-bold">
          Sign In <i class="bi bi-arrow-right-short fs-4 align-middle"></i>
        </button>
      </div>
    </form>
    
    <div class="text-center mt-4">
      <p class="text-white-50 small">Don't have an account? Contact administration.</p>
    </div>
  </div>
</div>
{% endblock %}
