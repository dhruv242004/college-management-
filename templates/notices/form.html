{% extends "base.html" %}
{% block title %}{{ 'Edit' if notice else 'Add' }} notice – College CMS{% endblock %}
{% block content %}
<h2 class="mb-4">{{ 'Edit' if notice else 'Add' }} notice</h2>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post" data-validate>
      <div class="mb-3">
        <label class="form-label required">Title</label>
        <input type="text" name="title" class="form-control" required value="{{ notice.title if notice else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label required">Content</label>
        <textarea name="content" class="form-control" rows="6" required>{{ notice.content if notice else '' }}</textarea>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <select name="category" class="form-select">
            <option value="General" {% if notice and notice.category == 'General' %}selected{% endif %}>General</option>
            <option value="Exam" {% if notice and notice.category == 'Exam' %}selected{% endif %}>Exam</option>
            <option value="Event" {% if notice and notice.category == 'Event' %}selected{% endif %}>Event</option>
            <option value="Holiday" {% if notice and notice.category == 'Holiday' %}selected{% endif %}>Holiday</option>
            <option value="Academic" {% if notice and notice.category == 'Academic' %}selected{% endif %}>Academic</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Target role</label>
          <select name="target_role" class="form-select">
            <option value="">All</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{{ url_for('notice_bp.list_notices') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
