{% extends "base.html" %}
{% block title %}{{ 'Edit' if department else 'Add' }} Department – College CMS{% endblock %}
{% block content %}
<h2 class="mb-4">{{ 'Edit' if department else 'Add' }} Department</h2>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post" data-validate>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label required">Name</label>
          <input type="text" name="name" class="form-control" required value="{{ department.name if department else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label required">Code</label>
          <input type="text" name="code" class="form-control" required value="{{ department.code if department else '' }}" placeholder="e.g. CSE">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{{ url_for('academic_bp.list_departments') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
