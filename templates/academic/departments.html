{% extends "base.html" %}
{% block title %}Departments – College CMS{% endblock %}
{% block content %}
<h2 class="mb-4">Departments</h2>
<p><a href="{{ url_for('academic_bp.add_department') }}" class="btn btn-success"><i class="bi bi-plus-lg me-1"></i>Add Department</a></p>
<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for d in departments %}
        <tr>
          <td><code>{{ d.code }}</code></td>
          <td>{{ d.name }}</td>
          <td>
            <a href="{{ url_for('academic_bp.edit_department', did=d.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
            <form action="{{ url_for('academic_bp.delete_department', did=d.id) }}" method="post" class="d-inline" onsubmit="return confirm('Delete?');">
              <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="3" class="text-center text-muted">No departments.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
