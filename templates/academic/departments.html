{% extends "base.html" %}
{% block title %}Departments – College CMS{% endblock %}
{% block content %}
<div class="">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Departments</h2>
    <a href="{{ url_for('academic_bp.add_department') }}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add
      Department</a>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for d in departments %}
          <tr>
            <td><code class="text-secondary bg-opacity-10">{{ d.code }}</code></td>
            <td class="fw-bold text-white">{{ d.name }}</td>
            <td class="table-actions justify-content-end">
              <a href="{{ url_for('academic_bp.edit_department', did=d.id) }}" class="btn btn-secondary">Edit</a>
              <form action="{{ url_for('academic_bp.delete_department', did=d.id) }}" method="post" class="d-inline" onsubmit="return confirm('Delete?');">
                <button type="submit" class="btn btn-outline-danger">Delete</button>
              </form>
            </td>
          </tr>
          {% else %}
          <tr>
            <td colspan="3" class="text-center text-muted py-4">No departments found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
